<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联机德州扑克</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a31;
      --panel-2: #182240;
      --text: #eef3ff;
      --muted: #9fb0d6;
      --green: #1ec98c;
      --red: #ff6b6b;
      --yellow: #ffd166;
      --blue: #4ea8ff;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #162347 0%, #0b1020 55%, #070b16 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1560px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) 360px;
      gap: 16px;
      margin-bottom: 16px;
      align-items: start;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 10px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    input,
    button,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #0b1430;
      color: var(--text);
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    input::placeholder {
      color: #7d8eb5;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-green {
      background: linear-gradient(180deg, #1fd59a, #14aa78);
    }

    .btn-blue {
      background: linear-gradient(180deg, #64b7ff, #2d84e4);
    }

    .btn-red {
      background: linear-gradient(180deg, #ff7c7c, #ef5353);
    }

    .btn-yellow {
      background: linear-gradient(180deg, #ffd97e, #f5b82e);
      color: #1b1705;
    }

    .table-layout {
      margin-top: 16px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
    }

    .poker-table {
      min-height: 660px;
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      padding: 18px;
      background: radial-gradient(circle at center, #146b47 0%, #0f5a3c 40%, #0a3d2a 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 0 10px rgba(76, 46, 19, 0.22), inset 0 0 80px rgba(0, 0, 0, 0.22), var(--shadow);
    }

    .table-ring {
      position: absolute;
      inset: 24px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.09);
      pointer-events: none;
    }

    .center-box {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(86%, 720px);
      text-align: center;
      z-index: 2;
    }

    .room-panel {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .mini-chat .chat-messages {
      height: 360px;
      max-height: 360px;
    }

    .table-stage {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .center-potbar {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin: 14px 0 14px;
    }

    .center-chip {
      min-width: 150px;
      padding: 10px 18px;
      border-radius: 16px;
      background: rgba(11, 20, 48, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    .center-chip-label {
      font-size: 12px;
      color: #b7c8ef;
      margin-bottom: 4px;
    }

    .center-chip-value {
      font-size: 26px;
      font-weight: 900;
      color: #ffffff;
    }

    .table-actions-wrap {
      padding: 14px 16px;
    }

    .table-actions-wrap .raise-box {
      margin-top: 0;
    }

    .table-actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .community-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 16px;
      flex-wrap: wrap;
    }

    .seat-grid {
      position: relative;
      min-height: 660px;
    }

    .seat {
      position: absolute;
      width: 220px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(10, 16, 34, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .seat.me {
      border-color: rgba(255, 217, 102, 0.8);
      box-shadow: 0 0 0 2px rgba(255, 217, 102, 0.28), 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .seat.turn {
      outline: 2px solid rgba(30, 201, 140, 0.95);
      outline-offset: 2px;
    }

    .seat.folded {
      opacity: 0.55;
    }

    .seat.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      min-height: 110px;
    }

    .seat-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .seat-name {
      font-size: 16px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .seat-name span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.you {
      background: rgba(255, 217, 102, 0.16);
      color: #ffe59a;
    }

    .badge.dealer {
      background: rgba(78, 168, 255, 0.18);
      color: #92cbff;
    }

    .badge.turn {
      background: rgba(30, 201, 140, 0.18);
      color: #7ef0c4;
    }

    .badge.allin {
      background: rgba(255, 107, 107, 0.18);
      color: #ffabab;
    }

    .badge.fold {
      background: rgba(255, 255, 255, 0.12);
      color: #d4def8;
    }

    .badge.out {
      background: rgba(255, 255, 255, 0.12);
      color: #d4def8;
    }

    .seat-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .cards {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .playing-card {
      width: 50px;
      height: 72px;
      border-radius: 10px;
      background: linear-gradient(180deg, #ffffff, #eef4ff);
      color: #18213a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.20);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .playing-card.red {
      color: #cf2a2a;
    }

    .playing-card.back {
      background: linear-gradient(135deg, #2f4b83, #172544);
      color: #dbe7ff;
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .playing-card.back::after {
      content: "♠♥♣♦";
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .action-panel {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .raise-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 10px;
    }

    .log,
    .chat-messages {
      max-height: 300px;
      overflow: auto;
      padding-right: 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-item,
    .chat-item {
      border-radius: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 13px;
      color: #dbe6ff;
      line-height: 1.5;
      word-break: break-word;
    }

    .chat-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 4px;
      color: #b7c8ef;
    }

    .chat-body {
      color: #eef3ff;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .chat-input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 10px;
    }

    .footer-line {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .lobby-chat {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .lobby-chat .chat-messages {
      height: 260px;
      max-height: 260px;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .center-title {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .center-sub {
      color: rgba(255, 255, 255, 0.84);
      font-size: 15px;
      margin-top: 6px;
    }

    .winner {
      font-size: 18px;
      font-weight: 800;
      color: #fff0a1;
      margin-top: 10px;
    }

    @media (max-width: 1280px) {
      .table-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 1080px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .mini-chat .chat-messages {
        height: 240px;
        max-height: 240px;
      }

      .poker-table {
        min-height: 980px;
      }

      .seat-grid {
        min-height: 920px;
      }
    }

    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .config-grid {
        grid-template-columns: 1fr;
      }

      .seat {
        width: 180px;
      }

      .playing-card {
        width: 42px;
        height: 62px;
        font-size: 16px;
      }

      .center-title {
        font-size: 24px;
      }

      .action-panel {
        grid-template-columns: 1fr;
      }

      .chat-input-row,
      .raise-box {
        grid-template-columns: 1fr;
      }

      .table-actions-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="card">
        <h1 class="title">联机德州扑克</h1>
        <div class="sub">
          支持创建房间、加入房间、实时同步牌局和聊天。房主可以在开始前设置盲注和后手码量。
        </div>

        <div class="controls">
          <input id="nameInput" placeholder="输入你的昵称" maxlength="16" />
          <input id="roomInput" placeholder="输入房间号，例如 A1B2C3" maxlength="6" />
          <button id="createBtn" class="btn-green">创建房间</button>
          <button id="joinBtn" class="btn-blue">加入房间</button>
        </div>

        <div class="config-grid">
          <select id="blindSelect">
            <option value="10,20">盲注 10 / 20</option>
            <option value="25,50">盲注 25 / 50</option>
            <option value="50,100">盲注 50 / 100</option>
            <option value="100,200">盲注 100 / 200</option>
          </select>
          <select id="stackSelect">
            <option value="1000">后手码量 1000</option>
            <option value="2000">后手码量 2000</option>
            <option value="5000">后手码量 5000</option>
            <option value="10000">后手码量 10000</option>
          </select>
        </div>

        <div class="footer-line">
          开始前只有房主能修改配置；开始后会锁定，直到本局彻底结束或房主重新开始整场游戏。
        </div>

        <div class="room-panel">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
            <div>
              <div style="font-size:18px;font-weight:800;margin-bottom:6px;">当前连接</div>
              <div class="sub" id="roomMeta">未进入房间</div>
            </div>
            <button id="copyBtn" class="btn-yellow" style="max-width:220px;">复制邀请链接</button>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="stat-label">房间号</div>
              <div class="stat-value mono" id="roomIdStat">-</div>
            </div>
            <div class="stat">
              <div class="stat-label">牌局状态</div>
              <div class="stat-value" id="statusStat">等待中</div>
            </div>
          </div>

          <div class="action-panel">
            <button id="startBtn" class="btn-green">开始/下一手</button>
            <button id="resetMatchBtn" class="btn-yellow">重新开始整场</button>
          </div>

          <div class="action-panel">
            <button id="leaveBtn" class="btn-red">离开房间</button>
            <button id="copyRoomBtn" class="btn-blue">复制房间号</button>
          </div>
        </div>
      </div>

      <div class="card mini-chat">
        <div style="font-size:18px;font-weight:800;margin-bottom:10px;">房间聊天</div>
        <div class="chat-messages" id="chatBox"></div>
        <div class="chat-input-row">
          <input id="chatInput" placeholder="输入聊天内容，回车发送" maxlength="300" />
          <button id="chatSendBtn" class="btn-blue">发送</button>
        </div>
        <div class="footer-line">同一房间内所有玩家都能实时看到聊天内容。</div>
      </div>
    </div>

    <div class="table-layout">
      <div class="table-stage">
        <div class="poker-table">
          <div class="table-ring"></div>

          <div class="center-box">
            <div class="center-title" id="phaseText">等待玩家加入</div>
            <div class="center-sub" id="turnText">创建房间后开始牌局</div>

            <div class="center-potbar">
              <div class="center-chip">
                <div class="center-chip-label">公共池</div>
                <div class="center-chip-value" id="potStat">0</div>
              </div>
              <div class="center-chip">
                <div class="center-chip-label">当前下注</div>
                <div class="center-chip-value" id="betStat">0</div>
              </div>
            </div>

            <div class="community-row" id="communityCards"></div>
            <div class="winner" id="winnerText"></div>
          </div>

          <div class="seat-grid" id="seatGrid"></div>
        </div>

        <div class="card table-actions-wrap">
          <div class="raise-box">
            <input id="raiseInput" type="number" min="0" placeholder="加注到多少" />
            <button id="raiseBtn" class="btn-yellow">加注</button>
          </div>

          <div class="table-actions-grid">
            <button id="foldBtn" class="btn-red">弃牌</button>
            <button id="checkCallBtn" class="btn-blue">过牌 / 跟注</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  
  <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
  <script>

    const CLOUDBASE_ENV_ID = "dzpk-0giiv83p790a0f2b";
    const CLOUDBASE_REGION = "ap-shanghai";
    const ROOM_COLLECTION = "poker_rooms";
    const ROOM_ACTION_FUNCTION = "pokerRoomAction";

    const app = cloudbase.init({
      env: CLOUDBASE_ENV_ID,
      region: CLOUDBASE_REGION,
    });
    const auth = app.auth();
    let db = null;

    const els = {
      nameInput: document.getElementById("nameInput"),
      roomInput: document.getElementById("roomInput"),
      blindSelect: document.getElementById("blindSelect"),
      stackSelect: document.getElementById("stackSelect"),
      createBtn: document.getElementById("createBtn"),
      joinBtn: document.getElementById("joinBtn"),
      copyBtn: document.getElementById("copyBtn"),
      copyRoomBtn: document.getElementById("copyRoomBtn"),
      roomMeta: document.getElementById("roomMeta"),
      roomIdStat: document.getElementById("roomIdStat"),
      statusStat: document.getElementById("statusStat"),
      potStat: document.getElementById("potStat"),
      betStat: document.getElementById("betStat"),
      startBtn: document.getElementById("startBtn"),
      resetMatchBtn: document.getElementById("resetMatchBtn"),
      leaveBtn: document.getElementById("leaveBtn"),
      raiseInput: document.getElementById("raiseInput"),
      raiseBtn: document.getElementById("raiseBtn"),
      foldBtn: document.getElementById("foldBtn"),
      checkCallBtn: document.getElementById("checkCallBtn"),
      phaseText: document.getElementById("phaseText"),
      turnText: document.getElementById("turnText"),
      communityCards: document.getElementById("communityCards"),
      winnerText: document.getElementById("winnerText"),
      seatGrid: document.getElementById("seatGrid"),
      chatBox: document.getElementById("chatBox"),
      chatInput: document.getElementById("chatInput"),
      chatSendBtn: document.getElementById("chatSendBtn"),
    };

    const POSITIONS = [
      { left: "50%", top: "90%", transform: "translate(-50%, -50%)" },
      { left: "20%", top: "70%", transform: "translate(-50%, -50%)" },
      { left: "20%", top: "30%", transform: "translate(-50%, -50%)" },
      { left: "50%", top: "10%", transform: "translate(-50%, -50%)" },
      { left: "80%", top: "30%", transform: "translate(-50%, -50%)" },
      { left: "80%", top: "70%", transform: "translate(-50%, -50%)" },
    ];

    const state = {
      clientId: null,
      roomId: null,
      room: null,
      watcher: null,
      ready: false,
    };

    const savedName = localStorage.getItem("poker_name") || "";
    els.nameInput.value = savedName;

    const urlRoom = new URLSearchParams(location.search).get("room");
    if (urlRoom) els.roomInput.value = urlRoom.toUpperCase();

    function toast(msg) {
      alert(msg);
    }

    function getSelectedBlinds() {
      const [sb, bb] = els.blindSelect.value.split(",").map(Number);
      return { sb, bb };
    }

    function getSelectedStack() {
      return Number(els.stackSelect.value);
    }

    function saveName() {
      const name = (els.nameInput.value || "").trim().slice(0, 16);
      if (!name) throw new Error("请先输入昵称");
      localStorage.setItem("poker_name", name);
      return name;
    }

    function generateRoomId() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let out = "";
      for (let i = 0; i < 6; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    }

    async function initCloudbase() {
      await auth.signInAnonymously();
      const user = auth.currentUser || await auth.getCurrentUser();

      if (!user?.uid) {
        throw new Error("云开发匿名登录失败");
      }

      state.clientId = user.uid;
      db = app.database();
      state.ready = true;
      render();

      if (urlRoom && savedName) {
        await joinRoom().catch(() => {});
      }
    }

    async function callRoomAction(action, payload = {}) {
      if (!state.ready) throw new Error("云开发尚未初始化完成");
      const res = await app.callFunction({
        name: ROOM_ACTION_FUNCTION,
        data: { action, payload },
        parse: true,
      });
      const result = res?.result ?? res;
      if (result?.ok === false) throw new Error(result.message || "操作失败");
      return result;
    }

    function sortedPlayers(room) {
      return Object.values(room.players || {}).sort((a, b) => a.seat - b.seat);
    }

    function playerBySeat(room, seat) {
      return sortedPlayers(room).find((p) => p.seat === seat) || null;
    }

    function me(room) {
      return room?.players?.[state.clientId] || null;
    }

    async function createRoom() {
      const name = saveName();
      const { sb, bb } = getSelectedBlinds();
      const startingStack = getSelectedStack();

      let lastErr = null;
      for (let i = 0; i < 8; i++) {
        const roomId = generateRoomId();
        try {
          await callRoomAction("createRoom", {
            roomId,
            name,
            sb,
            bb,
            startingStack,
          });
          connectRoom(roomId);
          history.replaceState(null, "", `${location.pathname}?room=${roomId}`);
          return;
        } catch (err) {
          lastErr = err;
          if (!String(err.message || "").includes("房间号已存在")) break;
        }
      }

      throw lastErr || new Error("创建房间失败");
    }

    async function joinRoom() {
      const name = saveName();
      const roomId = (els.roomInput.value || "").trim().toUpperCase();
      if (!roomId) return toast("请输入房间号");

      await callRoomAction("joinRoom", { roomId, name });
      connectRoom(roomId);
      history.replaceState(null, "", `${location.pathname}?room=${roomId}`);
    }

    function connectRoom(roomId) {
      if (!db) return;

      state.roomId = roomId;
      if (state.watcher) {
        state.watcher.close().catch?.(() => {});
        state.watcher = null;
      }

      state.watcher = db.collection(ROOM_COLLECTION).doc(roomId).watch({
        onChange(snapshot) {
          const room = snapshot?.docs?.[0] || snapshot?.docChanges?.[0]?.doc || null;
          state.room = room || null;
          render();
        },
        onError(err) {
          toast(err?.message || "房间监听失败");
        }
      });
    }

    async function leaveRoom() {
      if (!state.roomId || !state.room) return;
      const roomId = state.roomId;

      try {
        await callRoomAction("leaveRoom", { roomId });
      } catch (err) {
        toast(err.message || "离开失败");
      }

      if (state.watcher) {
        state.watcher.close().catch?.(() => {});
        state.watcher = null;
      }
      state.roomId = null;
      state.room = null;
      history.replaceState(null, "", location.pathname);
      render();
    }

    async function takeAction(kind, raiseToRaw) {
      if (!state.roomId) return;
      try {
        await callRoomAction("takeAction", {
          roomId: state.roomId,
          kind,
          raiseTo: raiseToRaw == null ? null : Number(raiseToRaw),
        });
      } catch (err) {
        toast(err.message || "操作失败");
      }
    }

    async function startOrNextHand() {
      if (!state.roomId) return;
      const { sb, bb } = getSelectedBlinds();
      const startingStack = getSelectedStack();
      try {
        await callRoomAction("startHand", {
          roomId: state.roomId,
          sb,
          bb,
          startingStack,
        });
      } catch (err) {
        toast(err.message || "开始失败");
      }
    }

    async function resetMatch() {
      if (!state.roomId) return;
      const { sb, bb } = getSelectedBlinds();
      const startingStack = getSelectedStack();
      try {
        await callRoomAction("resetMatch", {
          roomId: state.roomId,
          sb,
          bb,
          startingStack,
        });
      } catch (err) {
        toast(err.message || "重开失败");
      }
    }

    async function sendChat() {
      if (!state.roomId || !state.room) return;
      const mine = me(state.room);
      if (!mine) return;

      const text = (els.chatInput.value || "").trim().slice(0, 300);
      if (!text) return;
      els.chatInput.value = "";

      try {
        await callRoomAction("sendChat", {
          roomId: state.roomId,
          text,
        });
      } catch (err) {
        toast(err.message || "发送失败");
      }
    }

    function humanPhase(phase) {
      switch (phase) {
        case "preflop": return "翻牌前";
        case "flop": return "翻牌圈";
        case "turn": return "转牌圈";
        case "river": return "河牌圈";
        case "结束": return "本手结束";
        case "比赛结束": return "整场结束";
        default: return phase || "等待中";
      }
    }

    function render() {
      const room = state.room;
      const mine = room ? me(room) : null;

      els.roomIdStat.textContent = room?.roomId || "-";
      els.statusStat.textContent = room ? humanPhase(room.phase) : "等待中";
      els.potStat.textContent = String(room?.pot || 0);
      els.betStat.textContent = String(room?.currentBet || 0);

      if (!state.ready) {
        els.roomMeta.textContent = "正在连接腾讯云 CloudBase…";
        els.phaseText.textContent = "初始化中";
        els.turnText.textContent = "请稍候";
        els.communityCards.innerHTML = "";
        els.winnerText.textContent = "";
        els.chatBox.innerHTML = "<div class='chat-item'><div class='chat-head'><span>系统</span><span>-</span></div><div class='chat-body'>正在初始化云开发连接。</div></div>";
        els.seatGrid.innerHTML = renderEmptySeats();
        setButtonsDisabled(true);
        return;
      }

      els.roomMeta.textContent = room
        ? `房主：${room.players?.[room.hostId]?.name || "-"} · 玩家数：${Object.keys(room.players || {}).length} · 盲注 ${room.settings?.sb || 0}/${room.settings?.bb || 0} · 后手 ${room.settings?.startingStack || 0}`
        : "未进入房间";

      if (!room) {
        els.phaseText.textContent = "等待玩家加入";
        els.turnText.textContent = "创建房间后开始牌局";
        els.communityCards.innerHTML = "";
        els.winnerText.textContent = "";
        els.chatBox.innerHTML = "<div class='chat-item'><div class='chat-head'><span>系统</span><span>-</span></div><div class='chat-body'>这里会显示聊天消息。</div></div>";
        els.seatGrid.innerHTML = renderEmptySeats();
        els.blindSelect.disabled = false;
        els.stackSelect.disabled = false;
        els.startBtn.disabled = true;
        els.resetMatchBtn.disabled = true;
        els.leaveBtn.disabled = true;
        els.copyRoomBtn.disabled = true;
        els.foldBtn.disabled = true;
        els.raiseBtn.disabled = true;
        els.checkCallBtn.disabled = true;
        els.chatSendBtn.disabled = true;
        els.chatInput.disabled = true;
        return;
      }

      const turnPlayer = room.turnSeat != null ? playerBySeat(room, room.turnSeat) : null;
      els.phaseText.textContent = room.status === "lobby" ? "等待开始" : humanPhase(room.phase);

      if (room.status === "matchOver") {
        els.turnText.textContent = "整场结束，房主可点击“重新开始整场”";
      } else {
        els.turnText.textContent = turnPlayer
          ? `轮到 ${turnPlayer.name}`
          : (room.status === "handOver" ? "点击开始/下一手继续" : "等待中");
      }

      els.winnerText.textContent = room.winnerText || "";
      els.communityCards.innerHTML = (room.community || []).map((c) => renderCard(c)).join("");
      els.chatBox.innerHTML = (room.chat || []).map((m) => `
        <div class="chat-item">
          <div class="chat-head"><span>${escapeHtml(m.sender || "匿名")}</span><span>${escapeHtml(m.timeText || "")}</span></div>
          <div class="chat-body">${escapeHtml(m.text || "")}</div>
        </div>
      `).join("") || "<div class='chat-item'><div class='chat-head'><span>系统</span><span>-</span></div><div class='chat-body'>暂无聊天</div></div>";

      els.seatGrid.innerHTML = renderSeats(room);
      els.chatBox.scrollTop = 0;

      const myTurn = !!(mine && room.status === "playing" && room.turnSeat === mine.seat && mine.inHand && !mine.folded && !mine.allIn);
      const canStart = !!(mine && room.hostId === state.clientId && (room.status === "lobby" || room.status === "handOver"));
      const canResetMatch = !!(mine && room.hostId === state.clientId);
      const canLeave = !!mine;
      const canRaiseNow = !!(myTurn && mine.stack > Math.max(0, room.currentBet - mine.bet));

      els.startBtn.disabled = !canStart;
      els.resetMatchBtn.disabled = !canResetMatch;
      els.leaveBtn.disabled = !canLeave;
      els.copyRoomBtn.disabled = !canLeave;
      els.foldBtn.disabled = !myTurn;
      els.raiseBtn.disabled = !canRaiseNow;
      els.chatSendBtn.disabled = !mine;
      els.chatInput.disabled = !mine;

      els.blindSelect.disabled = !(mine && room.hostId === state.clientId && room.status === "lobby");
      els.stackSelect.disabled = !(mine && room.hostId === state.clientId && room.status === "lobby");

      els.blindSelect.value = `${room.settings.sb},${room.settings.bb}`;
      els.stackSelect.value = String(room.settings.startingStack);

      let checkCallText = "过牌 / 跟注";
      if (mine && room.status === "playing") {
        const toCall = Math.max(0, room.currentBet - mine.bet);
        checkCallText = toCall === 0 ? "过牌" : `跟注 ${Math.min(toCall, mine.stack)}`;

        const minRaiseTo = room.currentBet + room.minRaise;
        const maxRaiseTo = mine.bet + mine.stack;

        if (myTurn) {
          if (maxRaiseTo <= room.currentBet) {
            els.raiseInput.placeholder = "筹码不足以加注";
          } else if (maxRaiseTo < minRaiseTo) {
            els.raiseInput.placeholder = `可直接ALL-IN到 ${maxRaiseTo}`;
          } else {
            els.raiseInput.placeholder = `最小加到 ${minRaiseTo}`;
          }
        } else {
          els.raiseInput.placeholder = "加注到多少";
        }
      }

      els.checkCallBtn.textContent = checkCallText;
      els.checkCallBtn.disabled = !myTurn;
    }

    function setButtonsDisabled(flag) {
      [els.startBtn, els.resetMatchBtn, els.leaveBtn, els.copyRoomBtn, els.foldBtn, els.raiseBtn, els.checkCallBtn, els.chatSendBtn].forEach((b) => b.disabled = flag);
      els.chatInput.disabled = flag;
    }

    function renderEmptySeats() {
      let html = "";
      for (let i = 0; i < 6; i++) {
        const pos = POSITIONS[i];
        html += `<div class="seat empty" style="left:${pos.left};top:${pos.top};transform:${pos.transform};">空座位 ${i + 1}</div>`;
      }
      return html;
    }

    function renderSeats(room) {
      let html = "";
      for (let seat = 0; seat < 6; seat++) {
        const p = playerBySeat(room, seat);
        const pos = POSITIONS[seat];

        if (!p) {
          html += `<div class="seat empty" style="left:${pos.left};top:${pos.top};transform:${pos.transform};">空座位 ${seat + 1}</div>`;
          continue;
        }

        const isMe = p.id === state.clientId;
        const isTurn = room.turnSeat === seat && room.status === "playing";
        const isDealer = room.dealerSeat === seat && room.status !== "lobby";
        const showCards = isMe || room.status === "handOver" || room.status === "matchOver";
        const seatClass = ["seat", isMe ? "me" : "", isTurn ? "turn" : "", p.folded ? "folded" : ""].join(" ").trim();

        let badges = "";
        if (isMe) badges += `<span class="badge you">你</span>`;
        if (isDealer) badges += `<span class="badge dealer">庄</span>`;
        if (isTurn) badges += `<span class="badge turn">行动</span>`;
        if (p.allIn) badges += `<span class="badge allin">ALL-IN</span>`;
        if (p.folded) badges += `<span class="badge fold">弃牌</span>`;
        if (p.outOfMatch) badges += `<span class="badge out">出局</span>`;

        const cards = p.cards?.length
          ? p.cards.map((c) => showCards ? renderCard(c) : renderCardBack()).join("")
          : `<span class="sub">未发牌</span>`;

        html += `
          <div class="${seatClass}" style="left:${pos.left};top:${pos.top};transform:${pos.transform};">
            <div class="seat-header">
              <div class="seat-name"><span>#${seat + 1}</span><span>${escapeHtml(p.name)}</span></div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">${badges}</div>
            </div>
            <div class="seat-meta">
              <span>筹码：${p.stack}</span>
              <span>本轮下注：${p.bet || 0}</span>
            </div>
            <div class="cards">${cards}</div>
          </div>
        `;
      }
      return html;
    }

    function renderCardBack() {
      return `<div class="playing-card back"></div>`;
    }

    function renderCard(card) {
      const rankMap = { T: "10" };
      const suitMap = { S: "♠", H: "♥", D: "♦", C: "♣" };
      const r = card[0];
      const s = card[1];
      const text = `${rankMap[r] || r}${suitMap[s]}`;
      const red = s === "H" || s === "D" ? "red" : "";
      return `<div class="playing-card ${red}">${text}</div>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    els.createBtn.addEventListener("click", () => createRoom().catch((err) => toast(err.message || "创建失败")));
    els.joinBtn.addEventListener("click", () => joinRoom().catch((err) => toast(err.message || "加入失败")));

    els.copyBtn.addEventListener("click", async () => {
      if (!state.roomId) return toast("请先进入房间");
      const url = `${location.origin}${location.pathname}?room=${state.roomId}`;
      try {
        await navigator.clipboard.writeText(url);
        toast("邀请链接已复制");
      } catch {
        toast(url);
      }
    });

    els.copyRoomBtn.addEventListener("click", async () => {
      if (!state.roomId) return toast("请先进入房间");
      try {
        await navigator.clipboard.writeText(state.roomId);
        toast("房间号已复制");
      } catch {
        toast(state.roomId);
      }
    });

    els.startBtn.addEventListener("click", startOrNextHand);
    els.resetMatchBtn.addEventListener("click", resetMatch);
    els.leaveBtn.addEventListener("click", () => leaveRoom().catch((err) => toast(err.message || "离开失败")));
    els.foldBtn.addEventListener("click", () => takeAction("fold"));
    els.checkCallBtn.addEventListener("click", () => takeAction("checkcall"));
    els.raiseBtn.addEventListener("click", () => takeAction("raise", els.raiseInput.value));
    els.chatSendBtn.addEventListener("click", sendChat);

    els.chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendChat();
      }
    });

    render();
    initCloudbase().catch((err) => {
      toast(err.message || "CloudBase 初始化失败");
      render();
    });

  </script>
</body>

</html>
